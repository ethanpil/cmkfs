name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      # Without a TTY lipgloss renders monochrome and every style is a no-op,
      # so a layout bug that only exists once escape sequences are in the
      # string passes unnoticed. Run the UI suite once with color forced —
      # the same thing main.go does on vt* consoles.
      - run: CLICOLOR_FORCE=1 go test ./internal/ui/

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -run=NONE -fuzz=FuzzBuild -fuzztime=30s ./internal/cmdgen/

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install filesystem tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xfsprogs btrfs-progs e2fsprogs dosfstools exfatprogs f2fs-tools dmsetup util-linux
      - name: Run loop-device integration tests as root
        run: |
          sudo --preserve-env=HOME env \
            "PATH=$PATH" \
            "GOMODCACHE=$(go env GOMODCACHE)" \
            "GOCACHE=$(go env GOCACHE)" \
            go test -tags integration -v -timeout 15m ./integration/...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build static binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -trimpath -o cmkfs ./cmd/cmkfs
      - name: Assert static (spec §2)
        run: |
          file cmkfs
          if ldd cmkfs 2>&1 | grep -q "not a dynamic executable"; then
            echo "static: OK"
          else
            echo "ERROR: binary is dynamically linked"; exit 1
          fi
      - name: Assert compiled-in schema data (acceptance criterion 2)
        run: strings cmkfs | grep -q largefile4
      - name: Assert Charm-only direct dependency graph (spec §3)
        run: |
          # Direct third-party requires must all be Charm modules; transitive
          # indirect deps pulled in by bubbletea are inherent and allowed.
          bad=$(go mod edit -json | jq -r '.Require[] | select(.Indirect != true) | .Path' \
            | grep -v '^github.com/charmbracelet/' || true)
          if [ -n "$bad" ]; then
            echo "ERROR: non-Charm direct dependencies:"; echo "$bad"; exit 1
          fi
          echo "direct deps: Charm-only OK"
          go version -m cmkfs
