# goreleaser v2 config (spec §14): static Linux binaries for amd64 and
# arm64, tar.gz archives, deb/rpm via nfpm, checksums.
version: 2

project_name: cmkfs

builds:
  - main: ./cmd/cmkfs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

nfpms:
  - package_name: cmkfs
    formats: [deb, rpm]
    maintainer: Ethan Piliavin <ethan@piliavin.com>
    homepage: https://github.com/ethanpil/cmkfs
    description: >-
      TUI front-end for mkfs.ext4, mkfs.xfs and mkfs.btrfs, in the spirit of
      cfdisk. Guides device selection, curated options, and safe execution
      with typed confirmation.
    dependencies:
      - util-linux

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  use: github

snapshot:
  version_template: "{{ incpatch .Version }}-dev"
